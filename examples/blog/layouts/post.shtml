<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{page.title}} - {{site.title}}</title>
  {{zlog.head}}
</head>
<body>
  <header><a href="/" data-z-prefetch="hover">{{site.title}}</a></header>
  <article>
    <h1 z-transition-name="{{page.transition}}">{{page.title}}</h1>
    <p><time>{{page.date}}</time> {{page.tags}}</p>
    {{content}}
  </article>
  {{zlog.runtime}}
</body>
</html>
